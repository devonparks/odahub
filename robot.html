<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODA Robot Lab</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--cyan:#00f5d4;--cyan-dim:#00f5d433;--cyan-mid:#00f5d488;--pink:#ff6b9d;--pink-dim:#ff6b9d33;--gold:#ffd700;--gold-dim:#ffd70033;--bg-deep:#060b18;--bg-panel:#0a1128;--bg-card:#0f1a36;--bg-card-hover:#142042;--text:#e0e8ff;--text-dim:#6b7ba3;--border:#1a2a52;--glow-cyan:0 0 20px #00f5d455,0 0 40px #00f5d422;--glow-pink:0 0 20px #ff6b9d55,0 0 40px #ff6b9d22;--glow-gold:0 0 20px #ffd70055,0 0 40px #ffd70022}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Exo 2',sans-serif;background:var(--bg-deep);color:var(--text);height:100vh;overflow:hidden;position:relative}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,245,212,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,212,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);pointer-events:none;z-index:9999}
.app{display:flex;height:100vh;position:relative;z-index:1}
.sb{width:280px;min-width:280px;background:var(--bg-panel);border-right:1px solid var(--border);display:flex;flex-direction:column;position:relative;overflow:hidden}
.sb::before{content:'';position:absolute;top:0;right:0;width:1px;height:100%;background:linear-gradient(to bottom,transparent,var(--cyan-mid),transparent)}
.sb-hd{padding:20px 18px 14px;border-bottom:1px solid var(--border)}
.sb-hd h1{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:3px;color:var(--cyan);text-transform:uppercase;text-shadow:var(--glow-cyan)}
.sb-hd .sub{font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.sb-hd .tag{display:inline-block;margin-top:8px;padding:3px 10px;background:var(--cyan-dim);border:1px solid var(--cyan);border-radius:4px;font-family:'Orbitron',monospace;font-size:10px;font-weight:600;color:var(--cyan);letter-spacing:2px}
.nav{flex:1;padding:8px 0;overflow-y:auto}
.ni{display:flex;align-items:center;gap:10px;padding:10px 18px;cursor:pointer;transition:all .3s;border-left:3px solid transparent}
.ni:hover{background:rgba(0,245,212,.04)}
.ni.act{background:rgba(0,245,212,.08);border-left-color:var(--cyan)}
.ni.done .nn{background:var(--cyan);color:var(--bg-deep);box-shadow:var(--glow-cyan)}
.nn{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:10px;font-weight:700;border:1px solid var(--border);background:var(--bg-card);color:var(--text-dim);transition:all .3s;flex-shrink:0}
.ni.act .nn{border-color:var(--cyan);color:var(--cyan);box-shadow:var(--glow-cyan)}
.nl{font-size:12px;font-weight:500;color:var(--text-dim);transition:color .3s;letter-spacing:.5px}
.ni.act .nl{color:var(--text)}.ni.done .nl{color:var(--cyan)}
.ls{border-top:1px solid var(--border);padding:14px 18px;background:rgba(0,245,212,.02);max-height:240px;overflow-y:auto}
.ls-t{font-family:'Orbitron',monospace;font-size:9px;font-weight:700;letter-spacing:3px;color:var(--cyan);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.ls-t .pulse{width:6px;height:6px;border-radius:50%;background:var(--cyan);animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 4px var(--cyan)}50%{opacity:.4;box-shadow:none}}
.sr{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:10px;border-bottom:1px solid rgba(26,42,82,.5)}.sr:last-child{border-bottom:none}
.sk{color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;font-size:8px;font-weight:600}
.sv{color:var(--cyan);font-weight:600;font-size:10px;text-align:right;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sv.empty{color:var(--text-dim);font-style:italic;font-weight:400}
.mp{flex:1;display:flex;flex-direction:column;overflow:hidden}
.mh{padding:20px 36px 0;flex-shrink:0}
.si{font-family:'Orbitron',monospace;font-size:9px;font-weight:600;letter-spacing:3px;color:var(--pink);text-transform:uppercase;margin-bottom:4px}
.st{font-family:'Orbitron',monospace;font-size:26px;font-weight:800;color:var(--text);letter-spacing:2px;text-shadow:0 0 30px rgba(0,245,212,.15)}
.sd{font-size:13px;color:var(--text-dim);margin-top:4px;line-height:1.5}
.mc{flex:1;padding:20px 36px 24px;overflow-y:auto;scroll-behavior:smooth}
.mc::-webkit-scrollbar{width:4px}.mc::-webkit-scrollbar-track{background:transparent}.mc::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.cg{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.oc{background:var(--bg-card);border:2px solid var(--border);border-radius:14px;padding:0;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;display:flex;flex-direction:column}
.oc::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,245,212,.05),transparent);opacity:0;transition:opacity .3s;z-index:0}
.oc:hover{border-color:var(--cyan-mid);background:var(--bg-card-hover);transform:translateY(-2px)}
.oc:hover::before{opacity:1}
.oc.sel{border-color:var(--cyan);box-shadow:var(--glow-cyan),inset 0 0 30px rgba(0,245,212,.05)}
.oc.sel::before{opacity:1}
.card-img{width:100%;height:170px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#080f24,#0d1633);border-bottom:1px solid var(--border);position:relative;overflow:hidden}
.card-img svg{width:82%;height:82%;max-width:220px}
.card-body{padding:16px 18px 18px;position:relative;z-index:1;flex:1}
.cb{display:inline-block;padding:2px 8px;border-radius:4px;font-family:'Orbitron',monospace;font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.b-rec{background:var(--cyan-dim);color:var(--cyan);border:1px solid var(--cyan)}
.b-bud{background:var(--gold-dim);color:var(--gold);border:1px solid var(--gold)}
.b-pro{background:var(--pink-dim);color:var(--pink);border:1px solid var(--pink)}
.cn{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px;letter-spacing:.5px}
.cp{font-family:'Orbitron',monospace;font-size:11px;font-weight:600;color:var(--gold);margin-bottom:6px}
.cd{font-size:11.5px;color:var(--text-dim);line-height:1.55}
.cc{position:absolute;top:12px;right:12px;width:28px;height:28px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .3s;font-size:13px;z-index:2;background:var(--bg-card)}
.oc.sel .cc{border-color:var(--cyan);background:var(--cyan);color:var(--bg-deep);box-shadow:var(--glow-cyan)}
.voice-prev{display:inline-block;margin-top:6px;padding:4px 10px;background:var(--bg-deep);border:1px solid var(--border);border-radius:6px;font-size:10px;color:var(--text-dim);font-style:italic}
.colg{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;max-width:600px}
.cs{aspect-ratio:1;border-radius:14px;cursor:pointer;border:3px solid transparent;transition:all .3s;position:relative;display:flex;align-items:flex-end;justify-content:center;padding-bottom:10px}
.cs:hover{transform:scale(1.08);border-color:rgba(255,255,255,.3)}
.cs.sel{border-color:#fff;box-shadow:0 0 20px rgba(255,255,255,.3);transform:scale(1.08)}
.cs .cl{font-family:'Orbitron',monospace;font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.9);text-shadow:0 1px 4px rgba(0,0,0,.6)}
.pg{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px}
.pt{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:var(--bg-card);border:2px solid var(--border);border-radius:10px;cursor:pointer;transition:all .3s}
.pt:hover{border-color:var(--cyan-mid);background:var(--bg-card-hover)}
.pt.on{border-color:var(--cyan);box-shadow:var(--glow-cyan)}
.pi{display:flex;align-items:center;gap:12px}
.pi .ico{font-size:22px;width:36px;text-align:center}
.pi .pn{font-family:'Orbitron',monospace;font-size:11px;font-weight:600;letter-spacing:1px;color:var(--text)}
.pi .pdsc{font-size:10px;color:var(--text-dim);margin-top:1px}
.ts{width:42px;height:22px;border-radius:11px;background:var(--border);position:relative;transition:all .3s;flex-shrink:0}
.ts::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:var(--text-dim);top:3px;left:3px;transition:all .3s}
.pt.on .ts{background:var(--cyan);box-shadow:var(--glow-cyan)}
.pt.on .ts::after{background:var(--bg-deep);left:23px}
.nw{max-width:600px;margin:20px auto;text-align:center}
.rni{width:100%;padding:18px 20px;background:var(--bg-card);border:2px solid var(--border);border-radius:12px;color:var(--cyan);font-family:'Orbitron',monospace;font-size:30px;font-weight:700;text-align:center;letter-spacing:4px;text-transform:uppercase;outline:none;transition:all .3s;caret-color:var(--cyan)}
.rni::placeholder{color:var(--text-dim);font-size:18px;letter-spacing:3px}
.rni:focus{border-color:var(--cyan);box-shadow:var(--glow-cyan)}
.nh{font-size:12px;color:var(--text-dim);margin-top:10px}
.mf{padding:16px 36px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--border);flex-shrink:0}
.nb{padding:10px 28px;border-radius:8px;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all .3s;text-transform:uppercase;border:none}
.nb.bk{background:transparent;border:1px solid var(--border);color:var(--text-dim)}
.nb.bk:hover{border-color:var(--text-dim);color:var(--text)}
.nb.nx{background:linear-gradient(135deg,var(--cyan),#00c4aa);color:var(--bg-deep);box-shadow:var(--glow-cyan)}
.nb.nx:hover{transform:translateY(-2px);box-shadow:0 0 25px #00f5d466,0 0 50px #00f5d433}
.nb:disabled{opacity:.3;cursor:not-allowed;transform:none!important}
.dots{display:flex;gap:6px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:all .3s}
.dot.act{background:var(--cyan);box-shadow:0 0 8px var(--cyan)}
.dot.done{background:var(--cyan);opacity:.5}
.fin{text-align:center;padding:10px 0}
.frn{font-family:'Orbitron',monospace;font-size:44px;font-weight:900;color:var(--cyan);letter-spacing:6px;text-transform:uppercase;text-shadow:var(--glow-cyan),0 0 60px rgba(0,245,212,.3);margin-bottom:6px;animation:gp 2s ease-in-out infinite}
@keyframes gp{0%,100%{text-shadow:var(--glow-cyan),0 0 60px rgba(0,245,212,.3)}50%{text-shadow:0 0 30px #00f5d488,0 0 60px #00f5d444,0 0 100px #00f5d422}}
.fsub{font-family:'Orbitron',monospace;font-size:10px;letter-spacing:4px;color:var(--text-dim);text-transform:uppercase;margin-bottom:24px}
.ss{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;padding:22px 28px;max-width:560px;margin:0 auto 20px;text-align:left}
.sst{font-family:'Orbitron',monospace;font-size:9px;font-weight:700;letter-spacing:3px;color:var(--pink);text-transform:uppercase;margin-bottom:14px;text-align:center}
.ssr{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(26,42,82,.6)}.ssr:last-child{border-bottom:none}
.ssk{font-family:'Orbitron',monospace;font-size:9px;font-weight:600;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase}
.ssv{font-weight:600;font-size:12px;color:var(--text)}
.ssv .cdot{display:inline-block;width:12px;height:12px;border-radius:50%;vertical-align:middle;margin-right:5px;border:1px solid rgba(255,255,255,.2)}
.plf{display:flex;flex-wrap:wrap;gap:5px;justify-content:flex-end}
.pch{padding:2px 8px;background:var(--cyan-dim);border:1px solid var(--cyan);border-radius:4px;font-family:'Orbitron',monospace;font-size:7px;font-weight:700;letter-spacing:1px;color:var(--cyan)}
.bbtn{display:inline-block;padding:14px 40px;background:linear-gradient(135deg,var(--cyan),#00c4aa);border:none;border-radius:12px;font-family:'Orbitron',monospace;font-size:16px;font-weight:800;letter-spacing:4px;color:var(--bg-deep);cursor:pointer;transition:all .3s;box-shadow:var(--glow-cyan);text-transform:uppercase;margin:6px 8px}
.bbtn:hover{transform:translateY(-3px) scale(1.02);box-shadow:0 0 30px #00f5d488,0 0 60px #00f5d444}
.bbtn:active{transform:translateY(0) scale(.98)}
.bbtn.save{background:linear-gradient(135deg,var(--pink),#ff4488);box-shadow:var(--glow-pink)}
.bbtn.save:hover{box-shadow:0 0 30px #ff6b9d88,0 0 60px #ff6b9d44}
.asm-ov{position:fixed;inset:0;z-index:9998;background:var(--bg-deep);display:none;flex-direction:column;align-items:center;justify-content:center}
.asm-ov.show{display:flex}
.asm-t{font-family:'Orbitron',monospace;font-size:14px;letter-spacing:4px;color:var(--cyan);text-transform:uppercase;margin-bottom:16px;text-shadow:var(--glow-cyan)}
.asm-s{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:2px;color:var(--text-dim);margin-top:14px;min-height:20px;transition:all .3s}
.asm-r{width:340px;height:400px}
.asm-r svg{width:100%;height:100%}
.asm-bar{width:300px;height:6px;background:var(--border);border-radius:3px;margin-top:16px;overflow:hidden}
.asm-fill{height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--pink));border-radius:3px;transition:width .5s ease}
.asm-done{display:none;gap:14px;margin-top:18px}.asm-done.show{display:flex}
.celeb{position:fixed;inset:0;z-index:10000;pointer-events:none;display:none}.celeb.on{display:block}
.conf{position:absolute;animation:cfall 3s ease-out forwards}
@keyframes cfall{0%{transform:translateY(-10px) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.fade-in{animation:fadeIn .35s ease forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.save-modal{position:fixed;inset:0;z-index:10001;background:rgba(6,11,24,.92);display:none;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.save-modal.show{display:flex}
.save-box{background:var(--bg-panel);border:1px solid var(--border);border-radius:16px;padding:28px;max-width:650px;width:90%;max-height:90vh;overflow-y:auto;position:relative}
.save-close{position:absolute;top:12px;right:16px;font-size:20px;color:var(--text-dim);cursor:pointer;background:none;border:none;font-family:'Orbitron',monospace}
.save-close:hover{color:var(--text)}
#printArea{background:var(--bg-deep);padding:24px;border-radius:12px;border:1px solid var(--border)}
.p-hd{text-align:center;margin-bottom:18px}
.p-hd h2{font-family:'Orbitron',monospace;font-size:26px;letter-spacing:4px}
.p-hd p{font-family:'Orbitron',monospace;font-size:9px;color:var(--text-dim);letter-spacing:3px;margin-top:3px}
.p-row{display:flex;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--border);font-size:12px}
.p-row:last-child{border-bottom:none}
.p-k{color:var(--text-dim);font-family:'Orbitron',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase}
.p-v{color:var(--text);font-weight:600}
.sa{display:flex;gap:10px;justify-content:center;margin-top:18px;flex-wrap:wrap}
.sa-b{padding:10px 22px;border-radius:8px;font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:2px;cursor:pointer;border:none;text-transform:uppercase;transition:all .3s}
.sa-b.pri{background:var(--cyan);color:var(--bg-deep)}
.sa-b.sec{background:transparent;border:1px solid var(--border);color:var(--text-dim)}
.sa-b:hover{transform:translateY(-1px)}
.sa-b.pink{background:var(--pink);color:var(--bg-deep)}
</style>
</head>
<body>
<div class="app">
<aside class="sb">
<div class="sb-hd"><h1>Robot Lab</h1><div class="sub">Design Console v3.0</div><div class="tag" id="engineerTag">Engineer: ???</div></div>
<nav class="nav" id="navItems"></nav>
<div class="ls"><div class="ls-t"><span class="pulse"></span> Live Specs</div><div id="liveSpecs"></div></div>
</aside>
<main class="mp">
<div class="mh"><div class="si" id="stepInd"></div><div class="st" id="stepTitle"></div><div class="sd" id="stepDesc"></div></div>
<div class="mc" id="mainC"></div>
<div class="mf"><button class="nb bk" id="backBtn" onclick="prev()">◂ Back</button><div class="dots" id="dots"></div><button class="nb nx" id="nextBtn" onclick="next()">Next ▸</button></div>
</main>
</div>
<div class="asm-ov" id="asmOv">
<div class="asm-t" id="asmT">⚙️ ASSEMBLING YOUR ROBOT...</div>
<div class="asm-r" id="asmR"></div>
<div class="asm-bar"><div class="asm-fill" id="asmF"></div></div>
<div class="asm-s" id="asmS"></div>
<div class="asm-done" id="asmD"><button class="bbtn" onclick="closeAsm()">🤖 VIEW SPEC SHEET</button></div>
</div>
<div class="celeb" id="celeb"></div>
<div class="save-modal" id="saveModal">
<div class="save-box">
<button class="save-close" onclick="closeSave()">✕</button>
<div id="printArea"></div>
<div class="sa">
<button class="sa-b pri" onclick="copySpec(this)">📋 Copy to Clipboard</button>
<button class="sa-b pink" onclick="printSpec()">🖨️ Print Spec Sheet</button>
<button class="sa-b sec" onclick="closeSave()">Close</button>
</div>
</div>
</div>
<script>
let engineerName = '';

// Name entry overlay
function showNameEntry() {
    const ov = document.createElement('div');
    ov.id = 'nameEntryOv';
    ov.style.cssText = 'position:fixed;inset:0;z-index:99999;background:#060b18;display:flex;flex-direction:column;align-items:center;justify-content:center;';
    ov.innerHTML = '<div style="text-align:center;max-width:400px;padding:20px">'
        + '<div style="font-size:48px;margin-bottom:16px">🤖</div>'
        + '<div style="font-family:Orbitron,monospace;font-size:24px;font-weight:800;color:#00f5d4;letter-spacing:3px;text-shadow:0 0 20px #00f5d455;margin-bottom:8px">ROBOT LAB</div>'
        + '<div style="font-family:Orbitron,monospace;font-size:10px;color:#6b7ba3;letter-spacing:3px;margin-bottom:32px">DESIGN CONSOLE v3.0</div>'
        + '<div style="font-family:Orbitron,monospace;font-size:11px;color:#6b7ba3;letter-spacing:2px;margin-bottom:12px">ENTER YOUR NAME, ENGINEER</div>'
        + '<input type="text" id="engineerInput" placeholder="TYPE YOUR NAME" maxlength="20" autocomplete="off" spellcheck="false" style="width:100%;padding:18px 20px;background:#0a1128;border:2px solid #1a2a52;border-radius:12px;color:#00f5d4;font-family:Orbitron,monospace;font-size:22px;font-weight:700;text-align:center;letter-spacing:4px;text-transform:uppercase;outline:none;caret-color:#00f5d4" />'
        + '<button id="startLabBtn" onclick="enterLab()" disabled style="margin-top:16px;padding:14px 40px;background:linear-gradient(135deg,#00f5d4,#00c4aa);border:none;border-radius:12px;font-family:Orbitron,monospace;font-size:14px;font-weight:800;letter-spacing:3px;color:#060b18;cursor:pointer;opacity:.3;transition:all .3s;text-transform:uppercase">ENTER LAB</button>'
        + '<div style="margin-top:20px"><a href="index.html" style="font-family:Orbitron,monospace;font-size:10px;color:#6b7ba3;letter-spacing:2px;text-decoration:none">← BACK TO ODA HUB</a></div>'
        + '</div>';
    document.body.appendChild(ov);
    var inp = document.getElementById('engineerInput');
    var btn = document.getElementById('startLabBtn');
    inp.addEventListener('input', function() {
        var ok = this.value.trim().length > 0;
        btn.disabled = !ok;
        btn.style.opacity = ok ? '1' : '.3';
    });
    inp.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && this.value.trim()) enterLab();
    });
    inp.addEventListener('focus', function() { this.style.borderColor = '#00f5d4'; });
    inp.addEventListener('blur', function() { this.style.borderColor = '#1a2a52'; });
    setTimeout(function() { inp.focus(); }, 100);
}

function enterLab() {
    engineerName = document.getElementById('engineerInput').value.trim();
    if (!engineerName) return;
    document.getElementById('engineerTag').textContent = 'Engineer: ' + engineerName;
    var ov = document.getElementById('nameEntryOv');
    ov.style.transition = 'opacity .3s';
    ov.style.opacity = '0';
    setTimeout(function() { ov.remove(); }, 300);
}

// Firebase save function — saves robot design to student account if logged in
function saveToFirebase() {
    var studentId = sessionStorage.getItem('studentId');
    if (!studentId || typeof window.fbDb === 'undefined') return;
    try {
        var data = {
            engineerName: engineerName,

function cards(opts,key){return opts.map((o,i)=>`<div class="oc ${sel[key]===i?'sel':''}" onclick="pk('${key}',${i})"><div class="cc">${sel[key]===i?'✓':''}</div><div class="card-img">${o.svg}</div><div class="card-body"><div class="cb ${o.badge}">${o.bt}</div><div class="cn">${o.name}</div><div class="cp">${o.price}</div><div class="cd">${o.desc}</div></div></div>`).join('')}

function finalHTML(){
const g=k=>({brain:BRAIN,body:BODY,hand:HAND,voice:VOICE})[k];
const v=(k,a)=>sel[k]!==null?a[sel[k]].name:'—';
const co=sel.color!==null?COLORS[sel.color]:null;const nm=sel.name.trim()||'UNNAMED';

}

function pk(k,i){sel[k]=i;rStep();uLS()}
function pkC(i){sel.color=i;rStep();uLS()}
function tP(id){const x=sel.powers.indexOf(id);if(x>=0)sel.powers.splice(x,1);else sel.powers.push(id);rStep();uLS()}
function uN(v){sel.name=v;uLS()}
function uLS(){const el=document.getElementById('liveSpecs');el.innerHTML=[{k:'Brain',v:sel.brain!==null?BRAIN[sel.brain].name:null},{k:'Body',v:sel.body!==null?BODY[sel.body].name:null},{k:'Hand',v:sel.hand!==null?HAND[sel.hand].name:null},{k:'Voice',v:sel.voice!==null?VOICE[sel.voice].name:null},{k:'Color',v:sel.color!==null?COLORS[sel.color].name:null},{k:'Powers',v:sel.powers.length>0?sel.powers.length+' active':null},{k:'Name',v:sel.name.trim()||null}].map(s=>`<div class="sr"><span class="sk">${s.k}</span><span class="sv ${s.v?'':'empty'}">${s.v||'—'}</span></div>`).join('')}
function next(){if(cur<STEPS.length-1){cur++;rStep();document.getElementById('mainC').scrollTop=0}}
function prev(){if(cur>0){cur--;rStep();document.getElementById('mainC').scrollTop=0}}
function go(i){cur=i;rStep();document.getElementById('mainC').scrollTop=0}

function startAsm(){
const ov=document.getElementById('asmOv'),fill=document.getElementById('asmF'),status=document.getElementById('asmS'),done=document.getElementById('asmD'),title=document.getElementById('asmT'),robot=document.getElementById('asmR');
ov.classList.add('show');fill.style.width='0%';done.classList.remove('show');title.textContent='⚙️ ASSEMBLING YOUR ROBOT...';
const color=sel.color!==null?COLORS[sel.color].hex:'#00f5d4';
const nm=sel.name.trim()||'ROBOT';
const hp=id=>sel.powers.includes(id);
const phases=[
{pct:12,msg:'🧠 Installing brain module...',ph:1},
{pct:28,msg:'🤖 Constructing body frame...',ph:2},
{pct:44,msg:'🦾 Attaching hand controller...',ph:3},
{pct:58,msg:'🔊 Calibrating voice system...',ph:4},
{pct:72,msg:`🎨 Applying ${sel.color!==null?COLORS[sel.color].name:'default'} color...`,ph:5},
{pct:86,msg:'⚡ Activating powers...',ph:6},
{pct:96,msg:`✏️ Programming name: ${nm}...`,ph:7},
{pct:100,msg:'',ph:8}
];
let i=0;robot.innerHTML='';
function run(){
if(i>=phases.length){title.textContent=`✅ ${nm} IS ONLINE`;status.textContent='All systems nominal. Robot is ready.';done.classList.add('show');fireworks();return}
const p=phases[i];fill.style.width=p.pct+'%';status.textContent=p.msg;drawBot(robot,color,p.ph,nm,hp);i++;setTimeout(run,750);
}
setTimeout(run,400);
}

pows.forEach((c,j)=>{s+=`<circle cx="${145+j*25}" cy="200" r="4" fill="${c}"><animate attributeName="opacity" values="1;.2;1" dur="${1+j*.3}s" repeatCount="indefinite"/></circle>`});

}

}
if(phase>=3){

s+=`<rect x="272" y="178" width="16" height="48" rx="6" fill="#1a2a52" stroke="${phase>=5?d:'#1a2a5288'}" stroke-width="1"/><circle cx="280" cy="230" r="8" fill="#1a2a52" stroke="${phase>=5?color:'#1a2a52'}" stroke-width="1.5"/>`;
}
if(phase>=2){
s+=`<rect x="132" y="270" width="28" height="56" rx="6" fill="#1a2a52" stroke="${phase>=5?d:'#1a2a5288'}" stroke-width="1"/><rect x="120" y="326" width="42" height="14" rx="4" fill="#1a2a52" stroke="${phase>=5?color+'88':'#1a2a52'}" stroke-width="1"/>`;
s+=`<rect x="182" y="270" width="28" height="56" rx="6" fill="#1a2a52" stroke="${phase>=5?d:'#1a2a5288'}" stroke-width="1"/><rect x="178" y="326" width="42" height="14" rx="4" fill="#1a2a52" stroke="${phase>=5?color+'88':'#1a2a52'}" stroke-width="1"/>`;

function closeAsm(){document.getElementById('asmOv').classList.remove('show');rStep()}

function fireworks(){
const el=document.getElementById('celeb');el.classList.add('on');el.innerHTML='';
const cols=['#00f5d4','#ff6b9d','#ffd700','#4d7cff','#a8ff44','#b44dff','#ff8844'];
